# ═══════════════════════════════════════════════════════════
#  CONFIGURAZIONE PANNELLO NEWS — ELOGI
#  Non serve modificare nulla qui dopo il setup iniziale.
#  L'unico valore da controllare è "repo" qui sotto (vedi guida).
# ═══════════════════════════════════════════════════════════

backend:
  name: git-gateway
  branch: main

# Cartella dove vengono caricati immagini e file allegati delle news
media_folder: "uploads/news"
public_folder: "/uploads/news"

# Lingua del pannello
locale: "it"

collections:
  - name: "news"
    label: "News"
    label_singular: "Novità"
    folder: "news/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{titolo}} — {{data}}"
    extension: "json"
    format: "json"
    fields:
      - { name: "titolo", label: "Titolo", widget: "string", hint: "Il titolo della novità" }
      - { name: "data", label: "Data dell'avvenimento", widget: "datetime", date_format: "DD/MM/YYYY", time_format: false, format: "YYYY-MM-DD", hint: "Modificabile: la data che vuoi mostrare sulla news" }
      - { name: "immagine", label: "Immagine (facoltativa)", widget: "image", required: false, hint: "Foto di copertina della news" }
      - { name: "testo", label: "Testo", widget: "text", hint: "Il contenuto della novità. Vai a capo liberamente." }
      - label: "File scaricabili (facoltativi)"
        name: "allegati"
        widget: "list"
        required: false
        summary: "{{fields.nome}}"
        fields:
          - { name: "nome", label: "Nome da mostrare", widget: "string" }
          - { name: "file", label: "File (PDF, immagine, ecc.)", widget: "file" }
      - label: "Link cliccabili (facoltativi)"
        name: "link"
        widget: "list"
        required: false
        summary: "{{fields.nome}}"
        fields:
          - { name: "nome", label: "Testo del link", widget: "string" }
          - { name: "url", label: "Indirizzo (https://...)", widget: "string" }
