<script>
/* ── NEWS LOADER (Netlify Blobs) ─────────────────────────── */
(async function loadNews(){
  const list = document.getElementById('newsList');
  const empty = document.getElementById('newsEmpty');
  if(!list) return;

  function fmtDate(iso){
    if(!iso) return '';
    try {
      const d = new Date(iso);
      const loc = currentLang === 'en' ? 'en-GB' : 'it-IT';
      return d.toLocaleDateString(loc, {day:'numeric', month:'long', year:'numeric'});
    } catch(e){ return iso; }
  }

  try {
    const res = await fetch('/.netlify/functions/get-news');
    if(!res.ok) throw new Error('no news');
    const items = await res.json();
    if(!Array.isArray(items) || items.length === 0){ empty.style.display='block'; return; }
    items.sort((a,b) => new Date(b.data||0) - new Date(a.data||0));
    list.innerHTML = items.map(n => {
      const img = n.immagine ? `<div class="news-card-img"><img src="${n.immagine}" alt="${(n.titolo||'').replace(/"/g,'&quot;')}" loading="lazy"></div>` : '';
      let atts = '';
      if(Array.isArray(n.allegati)) n.allegati.forEach(a => {
        if(a&&a.file) atts += `<a class="news-att" href="${a.file}" target="_blank" rel="noopener"><i class="fa-solid fa-paperclip"></i> ${a.nome||'Allegato'}</a>`;
      });
      if(Array.isArray(n.link)) n.link.forEach(l => {
        if(l&&l.url) atts += `<a class="news-att is-link" href="${l.url}" target="_blank" rel="noopener"><i class="fa-solid fa-arrow-up-right-from-square"></i> ${l.nome||l.url}</a>`;
      });
      const dateHtml = n.data ? `<span class="news-date"><i class="fa-solid fa-calendar-day"></i> ${fmtDate(n.data)}</span>` : '';
      return `<article class="news-card fi vis">
        ${img}
        <div class="news-card-body">
          ${dateHtml}
          <h3>${n.titolo||''}</h3>
          <div class="news-text">${(n.testo||'').replace(/</g,'&lt;')}</div>
          ${atts ? `<div class="news-attachments">${atts}</div>` : ''}
        </div>
      </article>`;
    }).join('');
  } catch(e){
    empty.style.display = 'block';
  }
})();

</script>
